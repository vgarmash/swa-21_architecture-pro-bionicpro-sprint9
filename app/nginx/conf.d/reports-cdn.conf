# Nginx CDN Configuration
# Place this file at: app/nginx/conf.d/reports-cdn.conf
#
# This configuration creates a CDN-like caching layer for MinIO-stored reports.
# Reports are cached for 24 hours to reduce load on MinIO and improve response times.

# Define cache zone for reports
proxy_cache_path /var/cache/nginx/reports 
    levels=1:2 
    keys_zone=reports_cache:10m 
    max_size=1g 
    inactive=24h 
    use_temp_path=off;

# Upstream for MinIO server
upstream minio_backend {
    server minio:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost cdn.bionicpro.local;

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Reports bucket - cached endpoint
    location /reports/ {
        # Proxy to MinIO
        proxy_pass http://minio_backend/reports/;
        
        # Enable caching
        proxy_cache reports_cache;
        proxy_cache_valid 200 24h;          # Cache successful responses for 24 hours
        proxy_cache_valid 404 1m;           # Cache not found for 1 minute
        proxy_cache_key "$scheme$proxy_host$uri";
        
        # Cache lock - prevent cache stampede
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        
        # Add cache status header for debugging
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Cache-Key $uri always;
        
        # Proxy headers for MinIO
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        
        # HTTP version for keepalive
        proxy_http_version 1.1;
        
        # Response headers for cached content
        expires 24h;
        add_header Cache-Control "public, max-age=86400";
        
        # CORS headers for cross-origin access
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        
        # Handle OPTIONS preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Cache purge endpoint (admin only)
    location ~ ^/purge/(.*)$ {
        # Restrict to internal network only
        allow 127.0.0.1;
        allow 172.16.0.0/12;    # Docker network
        deny all;
        
        # Purge the cache
        proxy_cache_purge reports_cache "$scheme$proxy_host$1";
        
        # Return success
        return 200 "Cache purged: $1\n";
        add_header Content-Type text/plain;
    }

    # Access log with cache status
    access_log /var/log/nginx/reports_cdn_access.log combined;
    error_log /var/log/nginx/reports_cdn_error.log;
}
