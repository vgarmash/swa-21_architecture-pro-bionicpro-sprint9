server:
  port: 8000
  servlet:
    context-path: /

spring:
  application:
    name: bionicpro-auth
  session:
    store-type: redis
    redis:
      namespace: bionicpro:session
    timeout: 1800s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: ${KEYCLOAK_CLIENT_ID:bionicpro-auth}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: ${KEYCLOAK_REDIRECT_URI:http://localhost:8000/api/auth/callback}
            scope: openid,profile,email
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:reports-realm}
            authorization-uri: ${KEYCLOAK_PUBLIC_URL:http://localhost:8088}/realms/${KEYCLOAK_REALM:reports-realm}/protocol/openid-connect/auth
            token-uri: ${KEYCLOAK_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:reports-realm}/protocol/openid-connect/token
            user-info-uri: ${KEYCLOAK_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:reports-realm}/protocol/openid-connect/userinfo
            jwk-set-uri: ${KEYCLOAK_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:reports-realm}/protocol/openid-connect/certs

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://keycloak:8080}
  public-url: ${KEYCLOAK_PUBLIC_URL:http://localhost:8088}
  realm: ${KEYCLOAK_REALM:reports-realm}
  client-id: ${KEYCLOAK_CLIENT_ID:bionicpro-auth}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
  redirect-uri: ${KEYCLOAK_REDIRECT_URI:http://localhost:8000/api/auth/callback}

oauth2:
  aes-key: ${OAUTH2_AES_KEY:}
  salt: ${OAUTH2_SALT:}

auth:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  session:
    timeout-minutes: 30
    cookie-name: BIONICPRO_SESSION
    cookie-secure: true
  token:
    access-token-timeout-minutes: 2
    refresh-token-timeout-minutes: 30

# Timeouts for external integrations (≤2000ms)
timeouts:
  authentication-max-ms: 2000
  ldap-timeout-ms: 2000
  api-timeout-ms: 2000

# Logging
logging:
  level:
    com.bionicpro: DEBUG
    org.springframework.security: DEBUG
    org.springframework.session: DEBUG

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
