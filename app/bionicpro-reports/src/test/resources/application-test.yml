spring:
  application:
    name: bionicpro-reports
  
  datasource:
    url: jdbc:clickhouse://localhost:8123/test
    username: default
    password: 
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/bionicpro
          jwk-set-uri: http://localhost:8180/realms/bionicpro/protocol/openid-connect/certs
          mock-jwk-set-uri: https://mock-keycloak.example.com/.well-known/jwks.json

server:
  port: 8082

logging:
  level:
    com.bionicpro.reports: DEBUG

minio:
  enabled: false

# Test configuration for conditional beans
test:
  minio:
    enabled: false

# Provide dummy MinIO credentials so MinioReportServiceImpl constructor does not throw
# (MinIO client will not actually connect because minio.enabled=false)
app:
  minio:
    endpoint: http://localhost:9000
    access-key: testminioadmin
    secret-key: testminioadmin
    bucket-name: test-reports
    cdn-base-url: http://localhost:9000
    presigned-url-expiry-hours: 168
